<html>
    <head>
        <style>
            h1{
                background-color: red;
            }

            i{
                background-color: yellow;
            }
        </style>
    </head>

        <marquee behavior="" direction="right" scrollamount="100" onmouseover="stop()" onmouseout="start()">Hello how are you?</marquee>

        <h3>Hello how are you?</h3>
        <h4>Hello how are you?</h4>
        <h5>Hello how are you?</h5>
        <h6>Hello how are you?</h6>
        <p>This is paragraph tag</p>
        <i>i tag is used for italics</i>
        <u> to underline </u>
        <b>to bold the text</b>
    </body>
</html>
